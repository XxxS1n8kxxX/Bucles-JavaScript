<h2 id="btext">Bucles 1 tablas de multiplicar del 1 al 10</h2>

<p>Se muestran La tabla de multiplicar del número que
    ponemos en el input. Del 1 al 10.Si no ponemos número, se da un error.</p>
        
<FORM id="login">
    <label id="hasta">Tabla del: </label>
    <input type="text" id="n1"/>
</FORM>

<button id="b2">Empezar</button>
<button id="b3">Limpiar</button>

<br><br><br><br>

<div id="salida">
    <p id="res"></p>
</div>

</body>

<script>

$(document).ready(function(){
    
$("#b2").click(function(){
        
var x = parseInt(document.getElementById("n1").value);
var cont = 1;

            
    while ((cont <= 10) && (cont >= 1)){
        var solucion = (x * cont)
        $("#res").append(x + " x " + cont + " = " + solucion + "</br>");  
        cont++
            
    };
            
});
         
    
$('#b3').click(function(){
    $('#res').text("");
        
});
    
    
});


</script>
