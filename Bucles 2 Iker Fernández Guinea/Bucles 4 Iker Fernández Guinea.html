<h2 id="btext">Bucles 4 (Con bucle "while")</h2>

<p>Dado un número se tiene que calcular los
    divisores de dicho número.
    Un divisor es aquel que al dividir por el número
    el resto da 0.
    Resto; Módulo : %
    </p>
        
<FORM id="login">
    <label id="hasta">Numero</label>
    <input type="text" id="n1"/>
</FORM>

<button id="b2">Empezar</button>
<button id="b3">Limpiar</button>

<br><br><br><br>

<div id="salida">
    <p id="res"></p>
</div>

</body>

<script>

$(document).ready(function(){

$("#b2").click(function(){

var x = parseInt(document.getElementById("n1").value);
var y = 1

    while(y <= x){

        if((x % y) == 0){
            $("#res").append(y + "  ")
        }
        else{
            $("#res").append("")
        }

        y++
    }
});

$('#b3').click(function(){
    $('#res').text("");
    
});


});


</script>
